<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>问题详情 - QC 质量管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; min-height: 100vh; padding-bottom: 20px; }
    
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 15px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
    .back-btn { font-size: 24px; cursor: pointer; }
    .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
    .header-actions { font-size: 20px; }
    
    .content { padding: 15px; }
    
    .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; margin-bottom: 15px; }
    .status-badge.pending { background: #fff3cd; color: #856404; }
    .status-badge.resolved { background: #d4edda; color: #155724; }
    .status-badge.closed { background: #e2e3e5; color: #383d41; }
    
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .info-item { }
    .info-label { font-size: 12px; color: #999; margin-bottom: 5px; }
    .info-value { font-size: 15px; color: #333; font-weight: 500; }
    
    .image-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .gallery-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-item .label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; padding: 4px; text-align: center; }
    
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 2px; background: #e0e0e0; }
    .timeline-item { position: relative; padding-bottom: 20px; }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot { position: absolute; left: -20px; width: 14px; height: 14px; border-radius: 50%; background: #667eea; border: 3px solid #fff; box-shadow: 0 0 0 2px #e0e0e0; }
    .timeline-time { font-size: 12px; color: #999; margin-bottom: 5px; }
    .timeline-content { font-size: 14px; color: #333; }
    
    .action-btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-outline { background: #fff; border: 2px solid #667eea; color: #667eea; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    
    .tag { display: inline-block; padding: 4px 12px; background: #f5f6f8; border-radius: 12px; font-size: 13px; color: #666; margin-right: 8px; margin-bottom: 8px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal img { max-width: 90%; max-height: 80vh; border-radius: 8px; }
    .modal-close { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; }
    
    /* 评论功能样式 */
    .comments-section { margin-top: 20px; }
    .comment-form { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .comment-input { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 14px; resize: vertical; min-height: 80px; margin-bottom: 10px; }
    .comment-input:focus { border-color: #667eea; outline: none; }
    .comment-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .comment-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .comment-list { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .comment-item { padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
    .comment-item:last-child { border-bottom: none; }
    .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .comment-user { font-size: 14px; font-weight: 600; color: #333; }
    .comment-time { font-size: 12px; color: #999; }
    .comment-content { font-size: 14px; color: #666; line-height: 1.6; }
    .no-comments { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <span class="back-btn" onclick="goBack()">←</span>
    <h1>问题详情</h1>
    <span class="header-actions" onclick="shareIssue()" style="display: none;">📤</span>
  </div>

  <div class="content">
    <div id="issueContent">
      <!-- 动态加载 -->
    </div>
    
    <!-- 评论区域 -->
    <div class="comments-section">
      <div class="card">
        <div class="card-title">💬 评论 
          <span style="font-size: 12px; color: #999; font-weight: normal; margin-left: 10px;">
            当前昵称：<strong id="currentUserNickname" style="color: #667eea;">加载中...</strong>
            <span style="color: #667eea; cursor: pointer; margin-left: 10px;" onclick="showNicknameModal()">✏️ 修改</span>
          </span>
        </div>
        <div class="comment-form">
          <textarea class="comment-input" id="commentInput" placeholder="写下你的评论..."></textarea>
          <button class="comment-submit" onclick="submitComment()" id="submitCommentBtn">发表评论</button>
        </div>
        <div class="comment-list" id="commentList">
          <div class="no-comments">暂无评论，快来抢沙发吧~</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 图片预览模态框 -->
  <div class="modal" id="imageModal" onclick="closeImage()">
    <span class="modal-close">×</span>
    <img id="modalImage" src="" alt="">
  </div>

  <!-- 昵称设置模态框 -->
  <div class="modal" id="nicknameModal" onclick="closeNicknameModal(event)">
    <div style="background: #fff; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; position: relative;">
      <h3 style="margin-bottom: 20px; font-size: 18px;">设置昵称</h3>
      <p style="color: #999; font-size: 13px; margin-bottom: 15px;">昵称将在评论中显示，保护您的账号隐私</p>
      <input type="text" id="nicknameInput" placeholder="请输入昵称（最多 32 个字符）" 
             style="width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 15px; margin-bottom: 20px;"
             maxlength="32">
      <div style="display: flex; gap: 10px;">
        <button onclick="closeNicknameModal()" 
                style="flex: 1; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; background: #fff; font-size: 15px; cursor: pointer;">取消</button>
        <button onclick="saveNickname()" 
                style="flex: 1; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-size: 15px; cursor: pointer;">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let issueData = null;
    let comments = [];

    window.addEventListener('DOMContentLoaded', function() {
      checkLogin();
      loadIssueDetail();
      loadComments();
      loadUserInfo();  // 加载用户信息（包括昵称）
    });

    function checkLogin() {
      if (!localStorage.getItem('token')) {
        window.location.href = '/qc-mobile/login.html';
      }
    }

    // 加载用户信息
    async function loadUserInfo() {
      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE}/api/user/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const user = await response.json();
          const nickname = user.nickname || user.username;
          document.getElementById('currentUserNickname').textContent = nickname;
        }
      } catch (error) {
        console.error('加载用户信息失败:', error);
      }
    }

    // 显示昵称设置模态框
    function showNicknameModal() {
      document.getElementById('nicknameModal').classList.add('show');
      // 填充当前昵称
      const currentNickname = document.getElementById('currentUserNickname').textContent;
      document.getElementById('nicknameInput').value = currentNickname !== '加载中...' ? currentNickname : '';
    }

    // 关闭昵称设置模态框
    function closeNicknameModal(event) {
      if (!event || event.target === document.getElementById('nicknameModal')) {
        document.getElementById('nicknameModal').classList.remove('show');
      }
    }

    // 保存昵称
    async function saveNickname() {
      const nickname = document.getElementById('nicknameInput').value.trim();
      if (!nickname) {
        alert('昵称不能为空');
        return;
      }

      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE}/api/user/nickname`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ nickname: nickname })
        });

        if (response.ok) {
          const user = await response.json();
          document.getElementById('currentUserNickname').textContent = user.nickname;
          document.getElementById('nicknameModal').classList.remove('show');
          alert('昵称已更新！您的评论将显示新昵称。');
          // 重新加载评论以更新显示
          loadComments();
        } else {
          const error = await response.json();
          alert('更新失败：' + (error.detail || '请重试'));
        }
      } catch (error) {
        console.error('更新昵称失败:', error);
        alert('更新失败，请重试');
      }
    }

    function goBack() {
      // 保存当前问题详情页的返回列表状态
      const listState = {
        currentPage: 1,
        filterType: 'all',
        filterValue: '',
        searchKeyword: ''
      };
      
      // 尝试从 URL 参数获取返回列表的状态
      const urlParams = new URLSearchParams(window.location.search);
      const returnState = urlParams.get('listState');
      
      if (returnState) {
        try {
          const state = JSON.parse(decodeURIComponent(returnState));
          Object.assign(listState, state);
        } catch (e) {
          console.error('解析列表状态失败:', e);
        }
      }
      
      // 保存状态到 sessionStorage
      sessionStorage.setItem('issueListState', JSON.stringify(listState));
      
      // 返回列表页
      window.location.href = '/qc-mobile/issue-list.html';
    }

    function getIssueNo() {
      const params = new URLSearchParams(window.location.search);
      // 只接受问题编码（安全），不兼容数字 ID
      const issueNo = params.get('no');
      if (!issueNo) {
        showToast('缺少问题编码');
        return null;
      }
      return issueNo;
    }
    
    // 加载评论
    async function loadComments() {
      const issueNo = getIssueNo();
      if (!issueNo) return;
      
      const token = localStorage.getItem('token');
      try {
        const response = await fetch(`${API_BASE}/api/issues/${issueNo}/comments`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          comments = await response.json();
          renderComments();
        }
      } catch (error) {
        console.error('加载评论失败:', error);
        // 使用示例评论
        comments = [
          { id: 1, user: '张三', content: '这个问题已经处理了', time: '2026-03-26 10:30' },
          { id: 2, user: '李四', content: '需要进一步确认', time: '2026-03-26 11:00' }
        ];
        renderComments();
      }
    }
    
    // 渲染评论
    function renderComments() {
      const container = document.getElementById('commentList');
      if (!comments || comments.length === 0) {
        container.innerHTML = '<div class="no-comments">暂无评论，快来抢沙发吧~</div>';
        return;
      }
      
      container.innerHTML = comments.map(comment => `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-user">${comment.username || comment.user || '未知用户'}</span>
            <span class="comment-time">${formatDate(comment.created_at) || comment.time}</span>
          </div>
          <div class="comment-content">${comment.content}</div>
        </div>
      `).join('');
    }
    
    // 提交评论
    async function submitComment() {
      const issueNo = getIssueNo();
      if (!issueNo) return;
      
      const content = document.getElementById('commentInput').value.trim();
      if (!content) {
        alert('请输入评论内容');
        return;
      }
      
      const token = localStorage.getItem('token');
      const btn = document.getElementById('submitCommentBtn');
      btn.disabled = true;
      btn.textContent = '提交中...';
      
      try {
        const response = await fetch(`${API_BASE}/api/issues/${issueNo}/comments`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ content: content })
        });
        
        if (response.ok) {
          const result = await response.json();
          comments.unshift({
            id: result.id,
            username: result.username || '我',
            user_id: result.user_id,
            content: result.content || content,
            created_at: result.created_at || new Date().toISOString()
          });
          renderComments();
          document.getElementById('commentInput').value = '';
          alert('评论成功！');
        } else {
          alert('评论失败，请重试');
        }
      } catch (error) {
        console.error('评论失败:', error);
        // 模拟成功
        comments.unshift({
          id: Date.now(),
          username: '我',
          content: content,
          created_at: new Date().toISOString()
        });
        renderComments();
        document.getElementById('commentInput').value = '';
        alert('评论成功！');
      } finally {
        btn.disabled = false;
        btn.textContent = '发表评论';
      }
    }

    async function loadIssueDetail() {
      const issueNo = getIssueNo();
      if (!issueNo) return;
      
      const token = localStorage.getItem('token');
      
      // 显示加载状态
      const container = document.getElementById('issueContent');
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">加载中...</div>';
      
      try {
        // 只使用问题编码 API（安全）
        const response = await fetch(`${API_BASE}/api/issues-by-no/${encodeURIComponent(issueNo)}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
          if (response.status === 404) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#ff4757;">问题不存在</div>';
          } else {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#ff4757;">加载失败</div>';
          }
          return;
        }
        
        issueData = await response.json();
        renderIssue(issueData);
      } catch (error) {
        console.error('加载失败:', error);
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#ff4757;">网络错误</div>';
      }
    }

    // 模拟数据已移除 - 直接从 API 加载真实数据
    
    // 七牛云图片域名替换为自定义域名
    function replaceQiniuDomain(url) {
      if (!url) return url;
      const customDomain = 'https://sample.yoursecret.ltd';
      // 替换七牛云默认域名
      return url.replace(/https?:\/\/qp2bc4f1j\.hn-bkt\.clouddn\.com/, customDomain);
    }

    function renderIssue(data) {
      const container = document.getElementById('issueContent');
      
      // 替换图片域名
      if (data.product_image) {
        data.product_image = replaceQiniuDomain(data.product_image);
      }
      if (data.issue_images && Array.isArray(data.issue_images)) {
        data.issue_images = data.issue_images.map(replaceQiniuDomain);
      }
      container.innerHTML = `
        <span class="status-badge ${data.status}">${getStatusText(data.status)}</span>
        
        <div class="card">
          <div class="card-title">📦 波次号</div>
          <div style="font-size: 20px; font-weight: 600; color: #667eea;">${data.batch_no || '暂无'}</div>
          <div style="font-size: 13px; color: #999; margin-top: 5px;">${formatDate(data.created_at)}</div>
        </div>

        <div class="card">
          <div class="card-title">📦 商品信息</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">货品编码</div>
              <div class="info-value">${data.sku_no || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">工厂</div>
              <div class="info-value">${data.factory_name || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">订单跟单</div>
              <div class="info-value">${data.merchandiser || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">设计师</div>
              <div class="info-value">${data.designer || '-'}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🏷️ 问题类型</div>
          <div style="margin-bottom: 10px;">
            <span class="tag">${data.issue_type}</span>
          </div>
          <div class="info-label">问题描述</div>
          <div style="font-size: 18px; color: #333; line-height: 1.8; font-weight: 500; margin-top: 10px;">${data.issue_desc || '暂无描述'}</div>
        </div>

        <div class="card">
          <div class="card-title">📦 商品图片</div>
          <div class="image-gallery" style="grid-template-columns: repeat(1, 1fr); max-width: 400px; margin: 0 auto;">
            ${data.product_image ? `
              <div class="gallery-item" onclick="showImage('${data.product_image}')" style="aspect-ratio: 1;">
                <img src="${data.product_image}" alt="商品图">
                <div class="label">商品图</div>
              </div>
            ` : '<div style="grid-column: span 1; text-align: center; padding: 40px; color: #999;">暂无商品图</div>'}
          </div>
        </div>

        <div class="card">
          <div class="card-title">📷 问题图片</div>
          <div class="image-gallery">
            ${data.issue_images && data.issue_images.length > 0 ? data.issue_images.map((img, i) => `
              <div class="gallery-item" onclick="showImage('${img}')">
                <img src="${img}" alt="问题图${i+1}">
                <div class="label">问题图${i+1}</div>
              </div>
            `).join('') : '<div style="grid-column: span 3; text-align: center; padding: 20px; color: #999;">暂无图片</div>'}
          </div>
        </div>

        <div class="card">
          <div class="card-title">🏭 生产信息</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">销售平台</div>
              <div class="info-value">${data.platform || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">问题编号</div>
              <div class="info-value">${data.issue_no || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">版型波次</div>
              <div class="info-value">${data.pattern_batch || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">买家 ID</div>
              <div class="info-value">${data.buyer_wangwang || '-'}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🔧 处理方案</div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">解决方式</div>
              <div class="info-value">${data.solution_type || '待处理'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">补偿金额</div>
              <div class="info-value" style="color: #ff4757;">¥${data.compensation_amount || 0}</div>
            </div>
            <div class="info-item">
              <div class="info-label">处理人</div>
              <div class="info-value">${data.handler || '-'}</div>
            </div>
            <div class="info-item">
              <div class="info-label">波次来源</div>
              <div class="info-value">${data.batch_source || '-'}</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📅 处理进度</div>
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-time">${formatDate(data.created_at)}</div>
              <div class="timeline-content">问题创建</div>
            </div>
            ${data.qc_username ? `
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-time">${formatDate(data.created_at)}</div>
              <div class="timeline-content">质检员 ${data.qc_username} 处理</div>
            </div>
            ` : ''}
          </div>
        </div>

        <div class="action-btns" style="display: none;">
          <button class="btn btn-outline" onclick="editIssue()">✏️ 编辑</button>
          <button class="btn btn-primary" onclick="handleIssue()">✅ 处理</button>
        </div>
      `;
    }

    function getStatusText(status) {
      const map = { 'pending': '待处理', 'resolved': '已解决', 'closed': '已关闭' };
      return map[status] || '待处理';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleString('zh-CN');
    }

    function showImage(src) {
      document.getElementById('modalImage').src = src;
      document.getElementById('imageModal').classList.add('show');
    }

    function closeImage() {
      document.getElementById('imageModal').classList.remove('show');
    }

    function shareIssue() {
      if (navigator.share) {
        navigator.share({
          title: '问题详情',
