<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>问题录入 - QC 质量管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; min-height: 100vh; padding-bottom: 80px; }
    
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
    .back-btn { font-size: 24px; cursor: pointer; }
    .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
    
    .form-section { background: #fff; margin: 15px; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .section-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
    .form-input { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: #667eea; }
    .input-with-btn { display: flex; gap: 10px; }
    .input-with-btn .form-input { flex: 1; }
    .scan-btn { padding: 12px 20px; background: #11998e; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    
    .image-upload { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .upload-item { aspect-ratio: 1; border: 2px dashed #ddd; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; background: #fafafa; position: relative; }
    .upload-item.has-image { border-style: solid; border-color: #667eea; }
    .upload-item .icon { font-size: 30px; color: #999; }
    .upload-item .label { font-size: 12px; color: #999; }
    .upload-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .upload-item .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 16px; display: none; }
    .upload-item.has-image .remove-btn { display: block; }
    
    .issue-types { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .type-item { padding: 12px 8px; border: 2px solid #e1e1e1; border-radius: 8px; text-align: center; font-size: 13px; cursor: pointer; transition: all 0.3s; }
    .type-item.selected { border-color: #667eea; background: rgba(102, 126, 234, 0.1); color: #667eea; }
    
    .textarea { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 15px; min-height: 100px; resize: vertical; outline: none; }
    .textarea:focus { border-color: #667eea; }
    
    .voice-btn { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f5f6f8; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    .voice-btn.recording { background: #ffebee; color: #ff4757; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    
    .solution-options { display: flex; flex-wrap: wrap; gap: 10px; }
    .solution-option { padding: 10px 20px; border: 2px solid #e1e1e1; border-radius: 20px; font-size: 14px; cursor: pointer; }
    .solution-option.selected { border-color: #667eea; background: #667eea; color: #fff; }
    
    .submit-btns { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 15px 20px; border-top: 1px solid #e1e1e1; display: flex; gap: 15px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-draft { background: #f5f6f8; color: #666; }
    .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .factory-select { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 15px; background: #fff; }
    
    .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .loading.show { display: flex; }
    .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="back-btn" onclick="goBack()">←</span>
    <h1>问题录入</h1>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <form id="issueForm">
    <!-- 商品信息 -->
    <div class="form-section">
      <div class="section-title">📦 商品信息</div>
      
      <div class="form-group">
        <label>款号/SKU</label>
        <div class="input-with-btn">
          <input type="text" class="form-input" id="skuNo" placeholder="请输入款号或扫码" required>
          <button type="button" class="scan-btn" onclick="scanCode()">📷 扫码</button>
        </div>
      </div>
      
      <div class="form-group">
        <label>工厂</label>
        <select class="factory-select" id="factory" required>
          <option value="">请选择工厂</option>
          <option value="元合服装厂">元合服装厂</option>
          <option value="三米制衣">三米制衣</option>
          <option value="乙超服饰">乙超服饰</option>
          <option value="浩迅服装">浩迅服装</option>
          <option value="丰庆制衣">丰庆制衣</option>
          <option value="春秋服饰">春秋服饰</option>
          <option value="易茂服装">易茂服装</option>
          <option value="爱探索">爱探索</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>波次号</label>
        <input type="text" class="form-input" id="batchNo" placeholder="例：FY28595">
      </div>
    </div>

    <!-- 图片上传 -->
    <div class="form-section">
      <div class="section-title">📷 拍照上传</div>
      <div class="image-upload">
        <div class="upload-item" id="upload-product" onclick="uploadImage('product')">
          <div class="icon">📦</div>
          <div class="label">商品图</div>
          <button type="button" class="remove-btn" onclick="removeImage('product', event)">×</button>
        </div>
        <div class="upload-item" id="upload-issue1" onclick="uploadImage('issue1')">
          <div class="icon">🔍</div>
          <div class="label">问题图 1</div>
          <button type="button" class="remove-btn" onclick="removeImage('issue1', event)">×</button>
        </div>
        <div class="upload-item" id="upload-issue2" onclick="uploadImage('issue2')">
          <div class="icon">🔍</div>
          <div class="label">问题图 2</div>
          <button type="button" class="remove-btn" onclick="removeImage('issue2', event)">×</button>
        </div>
      </div>
    </div>

    <!-- 问题类型 -->
    <div class="form-section">
      <div class="section-title">🏷️ 问题类型 <span style="font-size:12px;color:#999;font-weight:normal">(可多选)</span></div>
      <div class="issue-types">
        <div class="type-item" data-type="污渍" onclick="toggleType(this)">污渍</div>
        <div class="type-item" data-type="扣子" onclick="toggleType(this)">扣子</div>
        <div class="type-item" data-type="拉链" onclick="toggleType(this)">拉链</div>
        <div class="type-item" data-type="尺码不符" onclick="toggleType(this)">尺码不符</div>
        <div class="type-item" data-type="掉色" onclick="toggleType(this)">掉色</div>
        <div class="type-item" data-type="印花问题" onclick="toggleType(this)">印花问题</div>
        <div class="type-item" data-type="做工开线等" onclick="toggleType(this)">做工开线</div>
        <div class="type-item" data-type="破洞" onclick="toggleType(this)">破洞</div>
        <div class="type-item" data-type="起球勾线掉毛" onclick="toggleType(this)">起球勾线</div>
        <div class="type-item" data-type="过敏" onclick="toggleType(this)">过敏</div>
        <div class="type-item" data-type="洗唛和吊牌不符" onclick="toggleType(this)">洗唛不符</div>
        <div class="type-item" data-type="有味道" onclick="toggleType(this)">有味道</div>
        <div class="type-item" data-type="面料硬不舒服" onclick="toggleType(this)">面料硬</div>
        <div class="type-item" data-type="色差" onclick="toggleType(this)">色差</div>
        <div class="type-item" data-type="松紧坏" onclick="toggleType(this)">松紧坏</div>
        <div class="type-item" data-type="其他" onclick="toggleType(this)">其他</div>
      </div>
    </div>

    <!-- 问题描述 -->
    <div class="form-section">
      <div class="section-title">📝 问题描述</div>
      <textarea class="textarea" id="issueDesc" placeholder="请详细描述问题..."></textarea>
      <div class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <span>🎤</span>
        <span id="voiceText">点击语音输入</span>
      </div>
    </div>

    <!-- 解决方式 -->
    <div class="form-section">
      <div class="section-title">🔧 建议解决方式</div>
      <div class="solution-options">
        <div class="solution-option" data-value="退货" onclick="selectSolution(this)">退货</div>
        <div class="solution-option" data-value="换货" onclick="selectSolution(this)">换货</div>
        <div class="solution-option" data-value="补偿" onclick="selectSolution(this)">补偿</div>
        <div class="solution-option" data-value="现金补偿" onclick="selectSolution(this)">现金补偿</div>
        <div class="solution-option" data-value="返工" onclick="selectSolution(this)">返工</div>
      </div>
    </div>

    <!-- 补偿金额 -->
    <div class="form-section">
      <div class="section-title">💰 补偿金额</div>
      <input type="number" class="form-input" id="compensation" placeholder="0" min="0" step="0.01">
    </div>
  </form>

  <!-- 提交按钮 -->
  <div class="submit-btns">
    <button type="button" class="btn btn-draft" onclick="saveDraft()">💾 保存草稿</button>
    <button type="button" class="btn btn-submit" onclick="submitIssue()">✅ 提交</button>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let selectedTypes = [];
    let selectedSolution = null;
    let images = {};
    let imageUrls = {};
    let recognition = null;
    let isRecording = false;

    // 初始化语音识别
    function initSpeechRecognition() {
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        recognition.interimResults = true;

        recognition.onresult = function(event) {
          const transcript = Array.from(event.results)
            .map(result => result[0].transcript)
            .join('');
          document.getElementById('issueDesc').value = transcript;
        };

        recognition.onerror = function(event) {
          console.error('语音识别错误:', event.error);
          stopVoice();
          alert('语音识别失败：' + event.error);
        };

        recognition.onend = function() {
          stopVoice();
        };
      }
    }

    window.addEventListener('DOMContentLoaded', function() {
      checkLogin();
      initSpeechRecognition();
      
      const urlParams = new URLSearchParams(window.location.search);
      const sku = urlParams.get('sku');
      if (sku) {
        document.getElementById('skuNo').value = sku;
      }
    });

    function checkLogin() {
      if (!localStorage.getItem('token')) {
        window.location.href = '/qc-mobile/login.html';
      }
    }

    function goBack() {
      window.history.back();
    }

    // 1. 扫码功能 - 使用 Barcode Detection API
    async function scanCode() {
      if ('BarcodeDetector' in window) {
        try {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
              const bitmap = await createImageBitmap(file);
              const barcodeDetector = new BarcodeDetector({ formats: ['code_128', 'ean_13', 'qr_code'] });
              const barcodes = await barcodeDetector.detect(bitmap);
              if (barcodes.length > 0) {
                document.getElementById('skuNo').value = barcodes[0].rawValue;
                alert('扫码成功：' + barcodes[0].rawValue);
              } else {
                alert('未识别到条码，请手动输入');
              }
            }
          };
          input.click();
        } catch (error) {
          fallbackScan();
        }
      } else {
        fallbackScan();
      }
    }

    function fallbackScan() {
      const sku = prompt('请输入 SKU 编码:');
      if (sku) document.getElementById('skuNo').value = sku;
    }

    function toggleType(element) {
      element.classList.toggle('selected');
      const type = element.dataset.type;
      if (selectedTypes.includes(type)) {
        selectedTypes = selectedTypes.filter(t => t !== type);
      } else {
        selectedTypes.push(type);
      }
    }

    function selectSolution(element) {
      document.querySelectorAll('.solution-option').forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      selectedSolution = element.dataset.value;
    }

    // 2. 图片上传功能
    function uploadImage(type) {
      if (images[type]) {
        alert('图片已上传，如需更换请先删除');
        return;
      }
      
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.capture = 'environment';
      
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
          showLoading();
          
          // 压缩图片
          const compressedFile = await compressImage(file);
          
          // 上传到服务器
          const formData = new FormData();
          formData.append('file', compressedFile);
          
          try {
            const token = localStorage.getItem('token');
            const response = await fetch(`${API_BASE}/uploads`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`
              },
              body: formData
            });
            
            let url;
            if (response.ok) {
              const result = await response.json();
              url = result.url || result.filename;
            } else {
              // 如果上传接口不可用，使用本地预览
              url = await readFileAsDataURL(compressedFile);
            }
            
            // 显示预览
            const uploadItem = document.getElementById(`upload-${type}`);
            uploadItem.classList.add('has-image');
            uploadItem.innerHTML = `
              <img src="${url}">
              <button type="button" class="remove-btn" onclick="removeImage('${type}', event)">×</button>
            `;
            
            images[type] = compressedFile;
            imageUrls[type] = url;
            
            alert('图片上传成功！');
          } catch (error) {
            console.error('上传失败:', error);
            alert('上传失败，请重试');
          } finally {
            hideLoading();
          }
        }
      };
      
      input.click();
    }

    function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 最大尺寸 1920x1920
            let width = img.width;
            let height = img.height;
            const maxSize = 1920;
            
            if (width > maxSize || height > maxSize) {
              const ratio = Math.min(maxSize / width, maxSize / height);
              width *= ratio;
              height *= ratio;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            canvas.toBlob((blob) => {
              resolve(new File([blob], file.name, { type: 'image/jpeg' }));
            }, 'image/jpeg', 0.8);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    function removeImage(type, event) {
      event.stopPropagation();
      const uploadItem = document.getElementById(`upload-${type}`);
      uploadItem.classList.remove('has-image');
      uploadItem.innerHTML = `
        <div class="icon">${type === 'product' ? '📦' : '🔍'}</div>
        <div class="label">${type === 'product' ? '商品图' : `问题图 ${type.slice(-1)}`}</div>
        <button type="button" class="remove-btn" onclick="removeImage('${type}', event)">×</button>
      `;
      delete images[type];
      delete imageUrls[type];
    }

    // 3. 语音输入功能
    function toggleVoice() {
      if (!recognition) {
        alert('您的浏览器不支持语音识别，请使用 Chrome 浏览器或手动输入');
        return;
      }
      
      if (isRecording) {
        stopVoice();
      } else {
        startVoice();
      }
    }

    function startVoice() {
      try {
        recognition.start();
        isRecording = true;
        const btn = document.getElementById('voiceBtn');
        const text = document.getElementById('voiceText');
        btn.classList.add('recording');
        text.textContent = '正在录音...请说话';
      } catch (error) {
        console.error('启动语音识别失败:', error);
        alert('语音识别启动失败，请重试');
      }
    }

    function stopVoice() {
      if (recognition) {
        recognition.stop();
      }
      isRecording = false;
      const btn = document.getElementById('voiceBtn');
      const text = document.getElementById('voiceText');
      btn.classList.remove('recording');
      text.textContent = '点击语音输入';
    }

    // 4. 提交功能
    async function submitIssue() {
      const token = localStorage.getItem('token');
      
      // 验证必填项
      const skuNo = document.getElementById('skuNo').value.trim();
      const factory = document.getElementById('factory').value;
      
      if (!skuNo) {
        alert('请填写款号/SKU');
        return;
      }
      if (!factory) {
        alert('请选择工厂');
        return;
      }
      if (selectedTypes.length === 0) {
        alert('请选择问题类型');
        return;
      }

      const formData = {
        sku_no: skuNo,
        factory_name: factory,
        batch_no: document.getElementById('batchNo').value.trim(),
        issue_type: selectedTypes.join(','),
        issue_desc: document.getElementById('issueDesc').value.trim(),
        solution_type: selectedSolution,
        compensation_amount: parseFloat(document.getElementById('compensation').value) || 0,
        product_image: imageUrls['product'] || null,
        issue_images: [imageUrls['issue1'], imageUrls['issue2']].filter(url => url)
      };

      showLoading();
      const submitBtn = document.querySelector('.btn-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = '提交中...';

      try {
        const response = await fetch(`${API_BASE}/api/issues`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          const result = await response.json();
          alert('提交成功！\n问题编号：' + (result.issue_no || result.id));
          
          // 清空表单
          document.getElementById('issueForm').reset();
          selectedTypes = [];
          selectedSolution = null;
          document.querySelectorAll('.type-item').forEach(item => item.classList.remove('selected'));
          document.querySelectorAll('.solution-option').forEach(item => item.classList.remove('selected'));
          
          // 跳转首页
          setTimeout(() => {
            window.location.href = '/qc-mobile/index.html';
          }, 1000);
        } else {
          const error = await response.json();
          alert('提交失败：' + (error.detail || error.message || '未知错误'));
        }
      } catch (error) {
        console.error('提交错误:', error);
        alert('网络错误，请检查网络连接后重试');
      } finally {
        hideLoading();
        submitBtn.disabled = false;
        submitBtn.textContent = '✅ 提交';
      }
    }

    function saveDraft() {
      const draft = {
        skuNo: document.getElementById('skuNo').value,
        factory: document.getElementById('factory').value,
        batchNo: document.getElementById('batchNo').value,
        selectedTypes: selectedTypes,
        selectedSolution: selectedSolution,
        issueDesc: document.getElementById('issueDesc').value,
        compensation: document.getElementById('compensation').value
      };
      localStorage.setItem('issueDraft', JSON.stringify(draft));
      alert('草稿已保存！下次打开页面时会自动加载。');
    }

    function showLoading() {
      document.getElementById('loading').classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
    }

    // 加载草稿
    function loadDraft() {
      const draftStr = localStorage.getItem('issueDraft');
      if (draftStr) {
        try {
          const draft = JSON.parse(draftStr);
          if (confirm('发现未提交的草稿，是否加载？')) {
            document.getElementById('skuNo').value = draft.skuNo || '';
            document.getElementById('factory').value = draft.factory || '';
            document.getElementById('batchNo').value = draft.batchNo || '';
            document.getElementById('issueDesc').value = draft.issueDesc || '';
            document.getElementById('compensation').value = draft.compensation || '';
            
            if (draft.selectedTypes) {
              selectedTypes = draft.selectedTypes;
              draft.selectedTypes.forEach(type => {
                const item = document.querySelector(`.type-item[data-type="${type}"]`);
                if (item) item.classList.add('selected');
              });
            }
            
            if (draft.selectedSolution) {
              selectedSolution = draft.selectedSolution;
              const item = document.querySelector(`.solution-option[data-value="${draft.selectedSolution}"]`);
              if (item) item.classList.add('selected');
            }
          }
          localStorage.removeItem('issueDraft');
        } catch (e) {
          console.error('加载草稿失败:', e);
        }
      }
    }

    // 页面加载时检查草稿
    window.addEventListener('DOMContentLoaded', loadDraft);
  </script>
</body>
</html>
