<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量导入波次数据 - QC 质量管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f8; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    h1 { font-size: 20px; color: #333; margin-bottom: 20px; text-align: center; }
    .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #667eea; background: rgba(102, 126, 234, 0.05); }
    .upload-area.dragover { border-color: #667eea; background: rgba(102, 126, 234, 0.1); }
    .icon { font-size: 48px; color: #999; margin-bottom: 15px; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; display: none; }
    .result.show { display: block; }
    .result.success { background: #d4edda; color: #155724; }
    .result.error { background: #f8d7da; color: #721c24; }
    .file-info { margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 6px; display: none; }
    .file-info.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>📦 批量导入波次数据</h1>
      
      <div class="upload-area" id="uploadArea">
        <div class="icon">📁</div>
        <div style="font-size: 16px; color: #666; margin-bottom: 10px;">点击或拖拽上传 CSV 文件</div>
        <div style="font-size: 13px; color: #999;">支持格式：.csv</div>
      </div>
      
      <input type="file" id="fileInput" accept=".csv" style="display: none;">
      
      <div class="file-info" id="fileInfo"></div>
      
      <button class="btn" id="uploadBtn" disabled>开始导入</button>
      
      <div class="result" id="result"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let selectedFile = null;

    // 检查登录状态
    const token = localStorage.getItem('token');
    if (!token) {
      alert('请先登录！');
      window.location.href = '/qc-mobile/login.html';
    }

    // 上传区域
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const result = document.getElementById('result');

    // 点击上传
    uploadArea.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        selectFile(e.target.files[0]);
      }
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        selectFile(e.dataTransfer.files[0]);
      }
    });

    // 选择文件
    function selectFile(file) {
      selectedFile = file;
      fileInfo.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
      fileInfo.classList.add('show');
      uploadBtn.disabled = false;
      result.classList.remove('show');
    }

    // 上传
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = '导入中...';
      result.classList.remove('show', 'success', 'error');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const response = await fetch(`${API_BASE}/api/batches/import-csv`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        const data = await response.json();

        result.textContent = data.message;
        result.classList.add('show', data.success ? 'success' : 'error');

        if (data.success) {
          uploadBtn.textContent = '✅ 导入完成';
          setTimeout(() => {
            uploadBtn.disabled = false;
            uploadBtn.textContent = '开始导入';
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
          }, 3000);
        } else {
          uploadBtn.disabled = false;
          uploadBtn.textContent = '开始导入';
        }

      } catch (error) {
        result.textContent = `导入失败：${error.message}`;
        result.classList.add('show', 'error');
        uploadBtn.disabled = false;
        uploadBtn.textContent = '开始导入';
      }
    });
  </script>
</body>
</html>
