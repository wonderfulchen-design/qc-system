<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QC 质量管理系统 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 40px;
    }

    .logo h1 {
      font-size: 24px;
      color: #333;
      font-weight: 600;
    }

    .logo p {
      font-size: 14px;
      color: #999;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 18px;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: 2px solid #e1e1e1;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-input::placeholder {
      color: #bbb;
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .forgot-password {
      text-align: center;
      margin-top: 20px;
    }

    .forgot-password a {
      color: #667eea;
      font-size: 14px;
      text-decoration: none;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .tips {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-top: 30px;
    }

    .tips-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .tips-content {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background: #d1fae5;
      color: #059669;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .wecom-login {
      margin-top: 30px;
      text-align: center;
    }

    .wecom-btn {
      display: inline-flex;
      align-items: center;
      padding: 12px 24px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .wecom-btn:hover {
      background: #06ad56;
    }

    .wecom-btn .icon {
      margin-right: 8px;
      font-size: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #999;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e1e1e1;
    }

    .divider span {
      padding: 0 15px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <h1>QC 质量管理系统</h1>
      <p>服装外发质量控制平台</p>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="请输入用户名"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="请输入密码"
            autocomplete="current-password"
            required
          >
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        登录
      </button>
    </form>

    <div class="forgot-password">
      <a href="#" onclick="alert('请联系管理员重置密码')">忘记密码？</a>
    </div>

    <div class="divider"><span>或</span></div>

    <div class="wecom-login">
      <button class="wecom-btn" onclick="wecomLogin()">
        <span class="icon">💬</span>
        企业微信快捷登录
      </button>
    </div>

    <div class="tips">
      <div class="tips-title">💡 温馨提示</div>
      <div class="tips-content">
        默认管理员账号：admin / admin123<br>
        首次登录请修改密码<br>
        如遇问题请联系系统管理员
      </div>
    </div>
  </div>

  <script>
    // API 基础 URL (根据实际部署修改)
    const API_BASE = window.location.origin;

    // 登录表单提交
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMessage');
      const successMsg = document.getElementById('successMessage');

      // 隐藏之前的消息
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      // 验证输入
      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      // 禁用按钮
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="loading"></span>登录中...';

      try {
        // 构建表单数据
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        // 调用登录接口
        const response = await fetch(`${API_BASE}/api/token`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          // 保存 Token 和用户信息
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('userInfo', JSON.stringify({
            user_id: data.user_id,
            username: data.username,
            role: data.role,
            real_name: data.real_name || data.username
          }));

          // 显示成功消息
          showSuccess('登录成功，即将跳转...');
          
          // 延迟跳转
          setTimeout(() => {
            window.location.href = '/qc-mobile/index.html';
          }, 1000);
        } else {
          showError(data.detail || '登录失败，请检查用户名和密码');
        }
      } catch (error) {
        console.error('登录错误:', error);
        showError('网络错误，请稍后重试');
      } finally {
        // 恢复按钮
        loginBtn.disabled = false;
        loginBtn.innerHTML = '登录';
      }
    });

    // 企业微信登录
    function wecomLogin() {
      // 企业微信 OAuth2 授权
      const corpId = 'YOUR_CORP_ID'; // 替换为企业 ID
      const agentId = 'YOUR_AGENT_ID'; // 替换为应用 AgentId
      const redirectUri = encodeURIComponent(window.location.href);
      
      // 构造授权 URL
      const authUrl = `https://open.weixin.qq.com/connect/oauth2/authorize?appid=${corpId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_privateinfo&agentid=${agentId}#wechat_redirect`;
      
      // 跳转到企业微信授权
      window.location.href = authUrl;
    }

    // 显示错误消息
    function showError(message) {
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.textContent = '❌ ' + message;
      errorMsg.style.display = 'block';
    }

    // 显示成功消息
    function showSuccess(message) {
      const successMsg = document.getElementById('successMessage');
      successMsg.textContent = '✅ ' + message;
      successMsg.style.display = 'block';
    }

    // 检查 URL 中的 code 参数 (企业微信回调)
    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      
      if (code) {
        // 企业微信授权回调，调用后端换取用户信息
        wecomAuthLogin(code);
      }
    });

    // 企业微信授权登录
    async function wecomAuthLogin(code) {
      try {
        const response = await fetch(`${API_BASE}/api/auth/wecom`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('userInfo', JSON.stringify(data.user));
          window.location.href = '/qc-mobile/index.html';
        } else {
          showError('企业微信登录失败：' + (data.detail || '未知错误'));
        }
      } catch (error) {
        console.error('企业微信登录错误:', error);
        showError('网络错误，请稍后重试');
      }
    }
  </script>
</body>
</html>
