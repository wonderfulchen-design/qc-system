version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: qc-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-QcSystem2025!@#}
      MYSQL_DATABASE: qc_system
      MYSQL_USER: qc_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-QcUser2025}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init_with_admin.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-QcSystem2025!@#}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qc-network

  # FastAPI 后端服务
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: qc-api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://qc_user:${MYSQL_PASSWORD:-QcUser2025}@mysql:3306/qc_system
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-qc-system-super-secret-jwt-key-2025}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-1}
      UPLOAD_DIR: /app/uploads
      PORT: 8000
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - qc-network
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: qc-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mobile:/usr/share/nginx/html/qc-mobile:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api
    networks:
      - qc-network

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  qc-network:
    driver: bridge
